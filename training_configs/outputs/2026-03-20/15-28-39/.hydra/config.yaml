data:
  format: zarr
  frequency: 24h
  timestep: 24h
  datasets:
    data:
      forcing:
      - cos_latitude
      - cos_longitude
      - sin_latitude
      - sin_longitude
      - cos_julian_day
      - cos_local_time
      - sin_julian_day
      - sin_local_time
      - insolation
      - 2t
      diagnostic: []
      processors:
        normalizer:
          _target_: anemoi.models.preprocessing.normalizer.InputNormalizer
          config: ${data.datasets.data.normalizer}
        const_imputer:
          _target_: anemoi.models.preprocessing.imputer.ConstantImputer
          config: ${data.datasets.data.const_imputer}
      normalizer:
        default: mean-std
        none:
        - cos_latitude
        - cos_longitude
        - sin_latitude
        - sin_longitude
        - cos_julian_day
        - cos_local_time
        - sin_julian_day
        - sin_local_time
        - insolation
      const_imputer:
        0:
        - sst
  num_features: null
  resolution: n48
dataloader:
  prefetch_factor: 2
  pin_memory: true
  read_group_size: ${system.hardware.num_gpus_per_model}
  num_workers:
    training: 1
    validation: 1
    test: 1
  batch_size:
    training: 1
    validation: 1
    test: 1
  limit_batches:
    training: 10
    validation: 10
    test: 20
  grid_indices:
    datasets:
      data:
        _target_: anemoi.training.data.grid_indices.FullGrid
        nodes_name: ${graph.data}
  dataset:
  - dataset: ${system.input.dataset}
    start: 2020
    end: 2024
    frequency: ${data.frequency}
    select:
    - 2t
    - sst
    - cos_julian_day
    - sin_julian_day
    - cos_local_time
    - sin_local_time
    - cos_longitude
    - sin_longitude
    - cos_latitude
    - sin_latitude
    - insolation
  model_run_info: null
  training:
    datasets:
      data:
        dataset: ${dataloader.dataset}
        start: 2020
        end: 2022
        frequency: ${data.frequency}
        drop: []
        trajectory: null
  validation_rollout: 1
  validation:
    datasets:
      data:
        dataset: ${dataloader.dataset}
        start: 2023
        end: 2023
        frequency: ${data.frequency}
        drop: []
        trajectory: null
  test:
    datasets:
      data:
        dataset: ${dataloader.dataset}
        start: 2024
        end: 2024
        frequency: ${data.frequency}
        drop: []
        trajectory: null
diagnostics:
  plot:
    asynchronous: false
    datashader: false
    frequency:
      batch: 750
      epoch: 5
    parameters:
    - sst
    sample_idx: 0
    precip_and_related_fields:
    - tp
    - cp
    colormaps:
      default:
        _target_: anemoi.training.utils.custom_colormaps.MatplotlibColormap
        name: viridis
      error:
        _target_: anemoi.training.utils.custom_colormaps.MatplotlibColormap
        name: bwr
      precip:
        _target_: anemoi.training.utils.custom_colormaps.MatplotlibColormapClevels
        clevels:
        - '#ffffff'
        - '#04e9e7'
        - '#019ff4'
        - '#0300f4'
        - '#02fd02'
        - '#01c501'
        - '#008e00'
        - '#fdf802'
        - '#e5bc00'
        - '#fd9500'
        - '#fd0000'
        - '#d40000'
        - '#bc0000'
        - '#f800fd'
        variables: ${diagnostics.plot.precip_and_related_fields}
    datasets_to_plot:
    - data
    focus_areas:
      europe:
        latlon_bbox:
        - 30.0
        - -20.0
        - 60.0
        - 40.0
      china:
        latlon_bbox:
        - 18.0
        - 73.0
        - 54.0
        - 135.0
    callbacks:
    - _target_: anemoi.training.diagnostics.callbacks.plot.PlotLoss
      dataset_names:
      - data
      parameter_groups:
        surface_ocean:
        - sst
    - _target_: anemoi.training.diagnostics.callbacks.plot.PlotSample
      dataset_names:
      - data
      sample_idx: ${diagnostics.plot.sample_idx}
      per_sample: 6
      parameters: ${diagnostics.plot.parameters}
      colormaps: ${diagnostics.plot.colormaps}
      accumulation_levels_plot:
      - 0
      - 0.1
      - 0.5
      - 1
      - 1.5
      - 5
      - 10
      - 100
  callbacks: []
  benchmark_profiler:
    memory:
      enabled: true
      steps: 5
      warmup: 2
      extra_plots: false
      trace_rank0_only: false
    time:
      enabled: true
      verbose: false
    speed:
      enabled: true
    system:
      enabled: true
    model_summary:
      enabled: true
    snapshot:
      enabled: true
      steps: 4
      warmup: 0
  debug:
    anomaly_detection: false
  enable_checkpointing: true
  checkpoint:
    every_n_minutes:
      save_frequency: 30
      num_models_saved: 3
    every_n_epochs:
      save_frequency: 1
      num_models_saved: -1
    every_n_train_steps:
      save_frequency: null
      num_models_saved: 0
  log:
    wandb:
      enabled: false
      offline: false
      log_model: false
      project: Anemoi
      entity: example
      gradients: false
      parameters: false
    tensorboard:
      enabled: false
    mlflow:
      enabled: true
      _target_: anemoi.training.diagnostics.mlflow.logger.AnemoiMLflowLogger
      offline: true
      authentication: true
      tracking_uri: https://mlflow.ecmwf.int
      experiment_name: ToySST
      project_name: Anemoi
      system: false
      terminal: true
      run_name: testing
      on_resume_create_child: true
      expand_hyperparams:
      - config
      http_max_retries: 35
      max_params_length: 2000
      save_dir: ${system.output.logs.mlflow}
    interval: 100
  enable_progress_bar: true
  progress_bar:
    _target_: pytorch_lightning.callbacks.TQDMProgressBar
    refresh_rate: 1
  check_val_every_n_epoch: 1
  print_memory_summary: false
system:
  output:
    root: ./mlocean_outputs
    logs:
      root: logs
      wandb: wandb
      mlflow: mlflow
      tensorboard: tensorboard
    checkpoints:
      root: checkpoint
      every_n_epochs: anemoi-by_epoch-epoch_{epoch:03d}-step_{step:06d}
      every_n_train_steps: anemoi-by_step-epoch_{epoch:03d}-step_{step:06d}
      every_n_minutes: anemoi-by_time-epoch_{epoch:03d}-step_{step:06d}
    plots: plots
    profiler: profiler
  input:
    dataset: ../ToySSTDataset.zarr
    graph: graph_${data.resolution}.pt
    truncation: null
    truncation_inv: null
    loss_matrices_path: null
    warm_start: null
  hardware:
    accelerator: auto
    num_gpus_per_node: 1
    num_nodes: 1
    num_gpus_per_model: 1
graph:
  overwrite: true
  data: data
  hidden: hidden
  nodes:
    data:
      node_builder:
        _target_: anemoi.graphs.nodes.AnemoiDatasetNodes
        dataset: PLACEHOLDER_DATASET_WILL_BE_OVERRIDDEN
      attributes: ${graph.attributes.nodes}
    hidden:
      node_builder:
        _target_: anemoi.graphs.nodes.TriNodes
        resolution: 3
  edges:
  - source_name: ${graph.data}
    target_name: ${graph.hidden}
    edge_builders:
    - _target_: anemoi.graphs.edges.CutOffEdges
      cutoff_factor: 0.6
      source_mask_attr_name: null
      target_mask_attr_name: null
    attributes: ${graph.attributes.edges}
  - source_name: ${graph.hidden}
    target_name: ${graph.hidden}
    edge_builders:
    - _target_: anemoi.graphs.edges.MultiScaleEdges
      x_hops: 1
      scale_resolutions: ${graph.nodes.hidden.node_builder.resolution}
      source_mask_attr_name: null
      target_mask_attr_name: null
    attributes: ${graph.attributes.edges}
  - source_name: ${graph.hidden}
    target_name: ${graph.data}
    edge_builders:
    - _target_: anemoi.graphs.edges.KNNEdges
      num_nearest_neighbours: 3
      source_mask_attr_name: null
      target_mask_attr_name: null
    attributes: ${graph.attributes.edges}
  attributes:
    nodes:
      area_weight:
        _target_: anemoi.graphs.nodes.attributes.SphericalAreaWeights
        norm: unit-max
        fill_value: 0
    edges:
      edge_length:
        _target_: anemoi.graphs.edges.attributes.EdgeLength
        norm: unit-std
      edge_dirs:
        _target_: anemoi.graphs.edges.attributes.EdgeDirection
        norm: unit-std
  post_processors: []
model:
  num_channels: 128
  cpu_offload: false
  keep_batch_sharded: true
  model:
    _target_: anemoi.models.models.AnemoiModelEncProcDec
  layer_kernels:
    LayerNorm:
      _target_: torch.nn.LayerNorm
    Linear:
      _target_: torch.nn.Linear
    Activation:
      _target_: torch.nn.GELU
    QueryNorm:
      _target_: anemoi.models.layers.normalization.AutocastLayerNorm
      bias: false
    KeyNorm:
      _target_: anemoi.models.layers.normalization.AutocastLayerNorm
      bias: false
  processor:
    _target_: anemoi.models.layers.processor.GraphTransformerProcessor
    trainable_size: ${model.trainable_parameters.hidden2hidden}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_layers: 16
    num_chunks: 4
    mlp_hidden_ratio: 4
    num_heads: 16
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    gradient_checkpointing: true
    layer_kernels: ${model.layer_kernels}
    graph_attention_backend: triton
    edge_pre_mlp: false
  encoder:
    _target_: anemoi.models.layers.mapper.GraphTransformerForwardMapper
    trainable_size: ${model.trainable_parameters.data2hidden}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_chunks: 4
    mlp_hidden_ratio: 4
    num_heads: 16
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    gradient_checkpointing: true
    layer_kernels: ${model.layer_kernels}
    shard_strategy: edges
    graph_attention_backend: triton
    edge_pre_mlp: false
  decoder:
    _target_: anemoi.models.layers.mapper.GraphTransformerBackwardMapper
    trainable_size: ${model.trainable_parameters.hidden2data}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_chunks: 4
    mlp_hidden_ratio: 4
    num_heads: 16
    initialise_data_extractor_zero: false
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    gradient_checkpointing: true
    layer_kernels: ${model.layer_kernels}
    shard_strategy: edges
    graph_attention_backend: triton
    edge_pre_mlp: false
  residual:
    _target_: anemoi.models.layers.residual.SkipConnection
    step: -1
  output_mask:
    _target_: anemoi.training.utils.masks.NoOutputMask
  trainable_parameters:
    data: 8
    hidden: 8
    data2hidden: 8
    hidden2data: 8
    hidden2hidden: 8
  compile:
  - module: anemoi.models.layers.conv.GraphTransformerConv
  attributes:
    edges:
    - edge_length
    - edge_dirs
    nodes: []
  bounding:
  - _target_: anemoi.models.layers.bounding.ReluBounding
    variables:
    - tp
training:
  scalers:
    datasets:
      data:
        general_variable:
          _target_: anemoi.training.losses.scalers.GeneralVariableLossScaler
          weights:
            default: 1
            q: 0.6
            t: 6
            u: 0.8
            v: 0.5
            w: 0.001
            z: 12
            sp: 10
            10u: 0.1
            10v: 0.1
            2d: 0.5
            tp: 0.025
            cp: 0.0025
        pressure_level:
          _target_: anemoi.training.losses.scalers.ReluVariableLevelScaler
          group: pl
          y_intercept: 0.2
          slope: 0.001
        nan_mask_weights:
          _target_: anemoi.training.losses.scalers.NaNMaskScaler
        stdev_tendency:
          _target_: anemoi.training.losses.scalers.StdevTendencyScaler
        var_tendency:
          _target_: anemoi.training.losses.scalers.VarTendencyScaler
        node_weights:
          _target_: anemoi.training.losses.scalers.GraphNodeAttributeScaler
          nodes_name: ${graph.data}
          nodes_attribute_name: area_weight
          norm: unit-sum
  run_id: null
  fork_run_id: null
  transfer_learning: false
  load_weights_only: false
  deterministic: false
  precision: 16-mixed
  multistep_input: 2
  accum_grad_batches: 1
  num_sanity_val_steps: 6
  gradient_clip:
    val: 32.0
    algorithm: value
  swa:
    enabled: false
    lr: 0.0001
  optimizer:
    _target_: torch.optim.AdamW
    betas:
    - 0.9
    - 0.95
  model_task: anemoi.training.train.tasks.GraphForecaster
  strategy:
    _target_: anemoi.training.distributed.strategy.DDPGroupStrategy
    num_gpus_per_model: ${system.hardware.num_gpus_per_model}
    read_group_size: ${dataloader.read_group_size}
  loss_gradient_scaling: false
  training_loss:
    datasets:
      data:
        _target_: anemoi.training.losses.MSELoss
        scalers:
        - nan_mask_weights
        - node_weights
        ignore_nans: true
  validation_metrics:
    datasets:
      data:
        mse:
          _target_: anemoi.training.losses.MSELoss
          scalers:
          - node_weights
          ignore_nans: true
  variable_groups:
    datasets:
      data:
        default: sfc
        pl:
          param:
          - q
          - t
          - u
          - v
          - w
          - z
  metrics:
    datasets:
      data:
      - sst
  rollout:
    start: 1
    epoch_increment: 0
    max: 1
  max_epochs: 2
  max_steps: 2500
  lr:
    warmup: 500
    rate: 0.0005
    iterations: ${training.max_steps}
    min: 3.0e-07
  submodules_to_freeze: []
  recompile_limit: 32
config_validation: true
